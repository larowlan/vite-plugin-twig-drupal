name: validate
on:
  pull_request: {}
jobs:
  main:
    strategy:
      matrix:
        node: [18, 20, 22]
        vite: [4, 5, 6, 7, 8]
        exclude:
          - node: 18
            vite: 7
          - node: 18
            vite: 8
    runs-on: ubuntu-latest
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.9.0

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v2

      - name: ⎔ Setup node
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node }}

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: ⚡️ Setup vite
        run: npm install vite@${{ matrix.vite }}

      - name: 🧹 Linting
        run: npm run lint

      - name: ✅ Tests
        run: npm run test
